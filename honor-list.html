<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全部荣誉资质 - 山西泽佑达智控科技有限公司</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --main:#0F4C81;
    --text-dark:#222;
    --text-normal:#444;
    --text-light:#777;
    --bg-page:#F5F7FA;
    --glass-bg: rgba(255,255,255,0.65);
    --glass-border: rgba(228,231,237,0.5);
    --blur: 12px;
    --shadow: 0 1px 8px rgba(15,76,129,0.06);
    --radius: 10px;
}
body{
    font-family:"Microsoft YaHei",system-ui,-apple-system,sans-serif;
    background:var(--bg-page);
    color:var(--text-normal);
    line-height:1.7;
    padding-top:160px;
}
a{text-decoration:none;color:inherit}
.container{
    width:100%;
    max-width:1360px;
    margin:0 auto;
    padding:0 24px;
}
.glass{
    background:var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}
.top-fixed{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:99;
}
.top-bar{
    background:var(--main);
    color:#fff;
    padding:14px 0;
}
.top-bar .container{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
}
.company-brand{
    display:flex;
    align-items:center;
    gap:12px;
}
.company-logo{
    height:36px;
    width:auto;
    object-fit:contain;
}
.company-brand .cn{
    font-size:22px;
    font-weight:600;
    letter-spacing:0.5px;
    display:block;
}
.company-brand .en{
    font-size:12px;
    opacity:0.9;
    margin-top:4px;
    display:block;
}
.top-right{
    display:flex;
    align-items:center;
    gap:24px;
    flex-wrap:wrap;
}
.tel-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
}
.tel-icon{
    width:18px;height:18px;
    background:#fff;
    color:var(--main);
    border-radius:50%;
    display:inline-flex;
    align-items:center;justify-content:center;
    font-weight:bold;
    font-size:12px;
}
.search-box{
    display:flex;
}
.search-input{
    width:170px;
    height:34px;
    padding:0 10px;
    border:none;
    outline:none;
    border-radius:var(--radius) 0 0 var(--radius);
    font-size:13px;
}
.search-btn{
    height:34px;
    padding:0 14px;
    background:#083057;
    color:#fff;
    border:none;
    border-radius:0 var(--radius) var(--radius) 0;
    cursor:pointer;
    font-size:13px;
    transition:background 0.24s;
}
.search-btn:hover{background:#05203a}
.nav-wrap{
    padding:10px 0;
}
.nav-wrap .container.glass{
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-evenly;
}
.nav-wrap a{
    font-size:15px;
    color:var(--text-dark);
    padding:0 10px;
    position:relative;
    transition:color 0.24s;
}
.nav-wrap a:hover{color:var(--main)}
.nav-wrap a:not(:last-child)::after{
    content:"|";
    color:#ccc;
    position:absolute;
    right:-14px;
}
.page-wrap{
    max-width:1360px;
    margin:40px auto 60px;
    padding:0 24px;
}
.page-title{
    text-align:center;
    font-size:32px;
    font-weight:600;
    color:var(--text-dark);
    margin-bottom:40px;
}
.qual-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap:30px;
}
.qual-card{
    padding:30px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.qual-img{
    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:var(--radius);
    margin-bottom:16px;
}
.qual-name{
    font-size:16px;
    font-weight:500;
    text-align:center;
    margin-bottom:16px;
}
.card-btn{
    width:76%;
    padding:9px 0;
    text-align:center;
    background:var(--main);
    color:#fff;
    border-radius:var(--radius);
    font-size:14px;
    transition:background 0.24s;
}
.card-btn:hover{background:#083057}
/* 删除原有居中返回按钮样式 */
.back-box,.back-btn{
    display:none;
}
.footer{
    background:var(--text-dark);
    color:#ccc;
    text-align:center;
    padding:28px 16px;
    font-size:12px;
    line-height:1.8;
}
/* 右下角固定悬浮小返回按钮，与AAA页面尺寸完全统一 */
.fixed-back{
    position:fixed;
    right:24px;
    bottom:30px;
    z-index:998;
    width:90px;
    height:40px;
    line-height:40px;
    text-align:center;
    background:var(--main);
    color:#fff;
    border-radius:30px;
    font-size:15px;
    box-shadow:0 3px 10px rgba(15,76,129,0.25);
}
.fixed-back:hover{
    background:#083057;
}
@media screen and (max-width:768px){
    body{padding-top:180px;}
    .nav-wrap .container.glass{flex-wrap:wrap;height:auto;padding:10px 0;gap:8px}
    .nav-wrap a{font-size:14px}
    .company-brand .cn{font-size:19px}
    .company-logo{height:28px;}
    .page-title{font-size:26px;}
    .fixed-back{
        width:75px;
        height:36px;
        line-height:36px;
        font-size:14px;
        right:16px;
        bottom:20px;
    }
}
</style>
</head>
<body>

        </div>

</div>

    <div class="qual-grid">

<script>
