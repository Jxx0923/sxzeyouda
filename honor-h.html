<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>实用新型专利证书 | 山西泽佑达智控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --main:#0F4C81;
    --text-dark:#222;
    --text-normal:#444;
    --text-light:#777;
    --bg-page:#F5F7FA;
    --glass-bg: rgba(255,255,255,0.65);
    --glass-border: rgba(228,231,237,0.5);
    --blur: 12px;
    --shadow: 0 1px 8px rgba(15,76,129,0.06);
    --radius: 10px;
}
body{
    font-family:"Microsoft YaHei",system-ui,sans-serif;
    background:var(--bg-page);
    color:var(--text-normal);
    line-height:1.7;
    padding-top:126px;
}
a{text-decoration:none;color:inherit}
.container{width:100%;max-width:1360px;margin:0 auto;padding:0 24px;}
.glass{
    background:var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}
.top-fixed{position:fixed;top:0;left:0;width:100%;z-index:99;}
.top-bar{background:var(--main);color:#fff;padding:14px 0;}
.top-bar .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.company-brand .cn{font-size:22px;font-weight:600;letter-spacing:0.5px;display:block;}
.company-brand .en{font-size:12px;opacity:0.9;margin-top:4px;display:block;}
.top-right{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.tel-item{display:flex;align-items:center;gap:6px;font-size:14px;}
.tel-icon{width:18px;height:18px;background:#fff;color:var(--main);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;}
.search-box{display:flex}
.search-input{width:170px;height:34px;padding:0 10px;border:none;outline:none;border-radius:var(--radius) 0 0 var(--radius);font-size:13px;}
.search-btn{height:34px;padding:0 14px;background:#083057;color:#fff;border:none;border-radius:0 var(--radius) var(--radius) 0;cursor:pointer;font-size:13px;transition:background 0.24s;}
.search-btn:hover{background:#05203a}
.nav-wrap{padding:10px 0;}
.nav-wrap .container.glass{padding:12px;display:flex;align-items:center;justify-content:space-evenly;}
.nav-wrap a{font-size:15px;color:var(--text-dark);padding:0 10px;position:relative;transition:color 0.24s;}
.nav-wrap a:hover{color:var(--main)}
.nav-wrap a:not(:last-child)::after{content:"|";color:#ccc;position:absolute;right:-14px;}
.detail-box{padding:30px;margin-bottom:30px;text-align:center;}
.title{font-size:26px;font-weight:600;color:var(--text-dark);margin-bottom:24px;}
.img-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-bottom:10px;
}
.img-item img{
    width:100%;
    max-width:720px;
    margin:0 auto;
    display:block;
    border-radius:var(--radius);
    object-fit:contain;
    cursor:zoom-in;
}
.desc{max-width:1000px;margin:0 auto;text-align:left;line-height:1.9;font-size:16px;margin-top:20px;}
.footer{background:var(--text-dark);color:#ccc;text-align:center;padding:28px 16px;font-size:12px;line-height:1.8;margin-top:40px;}

/* 悬浮固定返回按钮 */
.fixed-back{
    position:fixed;
    right:24px;
    bottom:30px;
    z-index:998;
    width:90px;
    height:40px;
    line-height:40px;
    text-align:center;
    background:var(--main);
    color:#fff;
    border-radius:30px;
    font-size:15px;
    box-shadow:0 3px 10px rgba(15,76,129,0.25);
}
.fixed-back:hover{background:#083057}

/* 全屏看图弹窗样式 */
.image-viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.image-viewer.active{display:flex;}
.view-close{
    position:absolute;
    top:20px;
    right:24px;
    color:#fff;
    font-size:32px;
    cursor:pointer;
    user-select:none;
}
.view-pre, .view-next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    line-height:44px;
    text-align:center;
    color:#fff;
    font-size:28px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    cursor:pointer;
    user-select:none;
}
.view-pre{left:24px;}
.view-next{right:24px;}
.view-count{
    position:absolute;
    bottom:24px;
    color:#fff;
    font-size:15px;
}
.view-img{
    max-width:92%;
    max-height:85vh;
    object-fit:contain;
}
@media screen and (max-width:768px){
    body{padding-top:150px;}
    .nav-wrap .container.glass{flex-wrap:wrap;height:auto;padding:10px 0;gap:8px}
    .nav-wrap a{font-size:14px}
    .company-brand .cn{font-size:19px}
    .view-pre,.view-next{display:none;}
    .fixed-back{width:75px;height:36px;line-height:36px;font-size:14px;right:16px;bottom:20px;}
}
</style>
</head>

<script>
function goSearch(){
    let val = document.getElementById('keyword').value.trim();
    if(!val){alert("请输入产品关键词");return}
    location.href = "product.html?key="+encodeURIComponent(val);
}
const imgList = ["img/h.png","img/i.png","img/j.png","img/k.png","img/l.png","img/m.png"];
let currentIndex = 0;
const viewer = document.getElementById('viewer');
const viewImg = document.getElementById('viewImg');
const countText = document.getElementById('countText');
const closeBtn = document.getElementById('closeBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
function openViewer(dom){
    currentIndex = Number(dom.dataset.index);
    renderImg();
    viewer.classList.add('active');
}
function renderImg(){
    viewImg.src = imgList[currentIndex];
    countText.textContent = `${currentIndex + 1} / ${imgList.length}`;
}
function prevImg(){
    if(currentIndex > 0){currentIndex--;renderImg();}
}
function nextImg(){
    if(currentIndex < imgList.length - 1){currentIndex++;renderImg();}
}
function closeViewer
